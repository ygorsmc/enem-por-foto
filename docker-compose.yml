services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
